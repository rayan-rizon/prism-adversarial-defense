model:
  name: cifar_resnet18
  # Smoke and Vast.ai exercise the SAME backbone artifact — the smoke pipeline
  # validates the same model that will be published. The prior smoke-specific
  # path (models/smoke_test/cifar_resnet18_smoke.pt) hosted a 3-epoch 51%-acc
  # backbone which silently poisoned every downstream artifact; that pathway
  # has been removed and the smoke pipeline now refuses to run unless this
  # production backbone meets the accuracy gate below.
  backbone_checkpoint: models/cifar_resnet18.pt
  # Hard floor on backbone clean test accuracy. Enforced by
  # scripts/verify_backbone_acc.py at the entry of run_smoke_test.sh,
  # run_vastai_full.sh, and scripts/build_profile_testset.py. Below this
  # floor the detector pipeline is statistically vacuous (TPR ≈ FPR).
  min_test_acc: 0.93
  num_classes: 10
  layer_names:
  - layer2
  - layer3
  - layer4
  layer_weights:
    layer2: 0.3
    layer3: 0.3
    layer4: 0.4
tda:
  n_subsample: 50
  max_dim: 1
  n_reference: 10
  dim_weights:
  - 0.7
  - 0.3
conformal:
  alphas:
    L1: 0.1
    L2: 0.03
    L3: 0.005
  calibration_size: 200
  validation_size: 200
  cal_alpha_factor: 0.7
  tier_cal_alpha_factors:
    L1: 0.7
    L2: 0.7
    L3: 0.5
splits:
  profile_idx:
  - 0
  - 200
  cal_idx:
  - 200
  - 400
  val_idx:
  - 400
  - 500
  eval_idx:
  - 500
  - 700
campaign:
  window_size: 50
  cp_threshold: 0.3
  hazard_rate: 0.033
  mu0: 7.0
  beta0: 15.0
  alert_run_length: 10
  alert_run_prob: 0.6
  warmup_steps: 10
  l0_factor: 0.8
moe:
  n_experts: 2
  hidden_dim: 64
memory:
  match_threshold: 0.5
data:
  dataset: cifar10
  image_size: 32
  mean:
  - 0.4914
  - 0.4822
  - 0.4465
  std:
  - 0.247
  - 0.2435
  - 0.2616
  data_root: ./data
profiling:
  n_clean_images: 200
evaluation:
  n_test_images: 100
  attacks:
  - FGSM
  - PGD
paths:
  reference_profiles: models/smoke_test/reference_profiles.pkl
  calibrator: models/smoke_test/calibrator.pkl
  ensemble_scorer: models/smoke_test/ensemble_scorer.pkl
  experts: models/smoke_test/experts.pkl
  clean_scores: models/smoke_test/clean_scores.npy
