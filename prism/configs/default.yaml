# PRISM: Predictive Runtime Immune System with Manifold Monitoring
# Default configuration

model:
  name: resnet18
  weights: IMAGENET1K_V1
  layer_names:
    - layer2
    - layer3
    - layer4
  layer_weights:
    layer2: 0.15            # mid-level features, FGSM perturbation signal
    layer3: 0.30            # intermediate semantic features
    layer4: 0.55            # deep features, strongest adversarial signal

tda:
  n_subsample: 200
  max_dim: 1
  n_reference: 50          # Number of medoid reference diagrams per layer
  dim_weights: [0.5, 0.5]  # Equal H0/H1 weighting — best empirical result

conformal:
  alphas:
    L1: 0.10               # 10% FPR — log + normal inference
    L2: 0.03               # 3% FPR — input purification
    L3: 0.005              # 0.5% FPR — expert routing or rejection
  calibration_size: 5000
  validation_size: 5000

campaign:
  window_size: 100
  cp_threshold: 0.3
  hazard_rate: 0.033       # 1/30 — detects campaign within ~30 adversarial probes
  mu0: 7.0                 # prior mean matched to clean score mean (layer2/3/4 equal dim_weights)
  beta0: 15.0              # alpha0 * clean_var ≈ 3.0 * 2.25^2
  alert_run_length: 10
  alert_run_prob: 0.60   # raised: requires stronger evidence to avoid false alarms on clean data
  warmup_steps: 35       # raised: allows BOCPD to stabilize before enabling detection
  l0_factor: 0.8           # lowers detection thresholds when L0 active

moe:
  n_experts: 4
  hidden_dim: 256

memory:
  match_threshold: 0.5

data:
  dataset: cifar10
  image_size: 224
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]
  data_root: ./data

profiling:
  n_clean_images: 10000

evaluation:
  n_test_images: 1000
  attacks:
    - FGSM
    - PGD
    - CW
    - Square
    - HopSkipJump

paths:
  reference_profiles: models/reference_profiles.pkl
  calibrator: models/calibrator.pkl
  clean_scores: experiments/calibration/clean_scores.npy
